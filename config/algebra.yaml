声调:
  - xform/ü/v/
  # 将 shēng diào 转为 sheng<1> diao<4>
  # 以$结尾的是普通字典 以;结尾的是pro字典
  - xform/^([a-z]+)(?=$|;)/${1}<5>/
  - xform/ā([a-z]*)(?=$|;)/a${1}<1>/
  - xform/á([a-z]*)(?=$|;)/a${1}<2>/
  - xform/ǎ([a-z]*)(?=$|;)/a${1}<3>/
  - xform/à([a-z]*)(?=$|;)/a${1}<4>/
  - xform/ō([a-z]*)(?=$|;)/o${1}<1>/
  - xform/ó([a-z]*)(?=$|;)/o${1}<2>/
  - xform/ǒ([a-z]*)(?=$|;)/o${1}<3>/
  - xform/ò([a-z]*)(?=$|;)/o${1}<4>/
  - xform/ē([a-z]*)(?=$|;)/e${1}<1>/
  - xform/é([a-z]*)(?=$|;)/e${1}<2>/
  - xform/ě([a-z]*)(?=$|;)/e${1}<3>/
  - xform/è([a-z]*)(?=$|;)/e${1}<4>/
  - xform/ī([a-z]*)(?=$|;)/i${1}<1>/
  - xform/í([a-z]*)(?=$|;)/i${1}<2>/
  - xform/ǐ([a-z]*)(?=$|;)/i${1}<3>/
  - xform/ì([a-z]*)(?=$|;)/i${1}<4>/
  - xform/ū([a-z]*)(?=$|;)/u${1}<1>/
  - xform/ú([a-z]*)(?=$|;)/u${1}<2>/
  - xform/ǔ([a-z]*)(?=$|;)/u${1}<3>/
  - xform/ù([a-z]*)(?=$|;)/u${1}<4>/
  - xform/ǖ([a-z]*)(?=$|;)/v${1}<1>/
  - xform/ǘ([a-z]*)(?=$|;)/v${1}<2>/
  - xform/ǚ([a-z]*)(?=$|;)/v${1}<3>/
  - xform/ǜ([a-z]*)(?=$|;)/v${1}<4>/
  - xform/ń([a-z]*)(?=$|;)/n${1}<2>/
  - xform/ň([a-z]*)(?=$|;)/n${1}<3>/
  - xform/ǹ([a-z]*)(?=$|;)/n${1}<4>/
  - xform/ḿ([a-z]*)(?=$|;)/m${1}<2>/
  - xform/m̀([a-z]*)(?=$|;)/m${1}<4>/

  # 万象拼音的 m n 特殊拼音处理
  - xform/^ng(?=(<[1-5]>))/eng/
  - xform/^n(?=(<[1-5]>))/en/
  - xform/^m(?=(<[1-5]>))/me/
自然码: # 全拼转自然码
  - derive/(^|')([jqxy])u(?=$|'|(<[1-5]>))/${1}${2}v/
  - derive/(^|')([aoe])([ioun])(?=$|'|(<[1-5]>))/${1}${2}${2}${3}/
  - xform/(^|')([aoe])(ng)?(?=$|'|(<[1-5]>))/${1}${2}${2}${3}/
  - xform/([a-z>])iu(?=$|'|(<[1-5]>))/${1}<q>/
  - xform/([a-z>])[iu]a(?=$|'|(<[1-5]>))/${1}<w>/
  - xform/([a-z>])[uv]an(?=$|'|(<[1-5]>))/${1}<r>/
  - xform/([a-z>])[uv]e(?=$|'|(<[1-5]>))/${1}<t>/
  - xform/([a-z>])(ing|uai)(?=$|'|(<[1-5]>))/${1}<y>/
  - xform/(^|')sh/${1}<u>/
  - xform/(^|')ch/${1}<i>/
  - xform/(^|')zh/${1}<v>/
  - xform/([a-z>])uo(?=$|'|(<[1-5]>))/${1}<o>/
  - xform/([a-z>])[uv]n(?=$|'|(<[1-5]>))/${1}<p>/
  - xform/([a-z>])i?ong(?=$|'|(<[1-5]>))/${1}<s>/
  - xform/([a-z>])[iu]ang(?=$|'|(<[1-5]>))/${1}<d>/
  - xform/([a-z>])en(?=$|'|(<[1-5]>))/${1}<f>/
  - xform/([a-z>])eng(?=$|'|(<[1-5]>))/${1}<g>/
  - xform/([a-z>])ang(?=$|'|(<[1-5]>))/${1}<h>/
  - xform/([a-z>])ian(?=$|'|(<[1-5]>))/${1}<m>/
  - xform/([a-z>])an(?=$|'|(<[1-5]>))/${1}<j>/
  - xform/([a-z>])iao(?=$|'|(<[1-5]>))/${1}<c>/
  - xform/([a-z>])ao(?=$|'|(<[1-5]>))/${1}<k>/
  - xform/([a-z>])ai(?=$|'|(<[1-5]>))/${1}<l>/
  - xform/([a-z>])ei(?=$|'|(<[1-5]>))/${1}<z>/
  - xform/([a-z>])ie(?=$|'|(<[1-5]>))/${1}<x>/
  - xform/([a-z>])ui(?=$|'|(<[1-5]>))/${1}<v>/
  - xform/([a-z>])ou(?=$|'|(<[1-5]>))/${1}<b>/
  - xform/([a-z>])in(?=$|'|(<[1-5]>))/${1}<n>/

  - xform/<([a-z])>/${1}/
九宫格:
  # |by*|kvc|qso|
  # |fnz|pix|gte|
  # |jml|ruw|hda|
  - xform/b/<11>/
  - xform/y/<12>/
  - xform/k/<21>/
  - xform/v/<22>/
  - xform/c/<23>/
  - xform/q/<31>/
  - xform/s/<32>/
  - xform/o/<33>/
  - xform/f/<41>/
  - xform/n/<42>/
  - xform/z/<43>/
  - xform/p/<51>/
  - xform/i/<52>/
  - xform/x/<53>/
  - xform/g/<61>/
  - xform/t/<62>/
  - xform/e/<63>/
  - xform/j/<71>/
  - xform/m/<72>/
  - xform/l/<73>/
  - xform/r/<81>/
  - xform/u/<82>/
  - xform/w/<83>/
  - xform/h/<91>/
  - xform/d/<92>/
  - xform/a/<93>/

  - xform/<[1-9]1><[1-9]1>/${0}1/
  - xform/<[1-9]1><[1-9]2>/${0}2/
  - xform/<[1-9]1><[1-9]3>/${0}3/
  - xform/<[1-9]2><[1-9]1>/${0}4/
  - xform/<[1-9]2><[1-9]2>/${0}5/
  - xform/<[1-9]2><[1-9]3>/${0}6/
  - xform/<[1-9]3><[1-9]1>/${0}7/
  - xform/<[1-9]3><[1-9]2>/${0}8/
  - xform/<[1-9]3><[1-9]3>/${0}9/
  - xform/<([1-9])[1-3]>/${1}/
imr_DPY:
  __patch:
    - __append: { __include: 声调 }
    - __append: { __include: 自然码 }
    - __append:
        - derive/^([a-z]{2})<[1-5]>(?=$|;)/${1}/
        - xform/^(.*);.*$/${1}/

        - xform/<1>/6/
        - xform/<2>/7/
        - xform/<3>/8/
        - xform/<4>/9/
        - xform/<5>/0/
imr_DPY_pro:
  __patch:
    - __append: { __include: 声调 }
    - __append: { __include: 自然码 }
    - __append:
        - derive|^([a-z]+)(<[1-5]>);.*$|$1| # 双拼
        - derive|^([a-z]+)(<[1-5]>);.*$|$1$2| # 双拼+声调
        # 分号后面第一组辅助码
        - derive|^([a-z]+)(<[1-5]>);([a-z]).*$|$1$3| # abc  双拼+1位辅助码
        - derive|^([a-z]+)(<[1-5]>);([a-z]).*$|$1$2$3| # ab1c 双拼+声调+1位辅助码
        - abbrev|^([a-z]+)(<[1-5]>);([a-z])([a-z]).*$|$1$3$4| # abcd   双拼+2位辅助码
        - derive|^([a-z]+)(<[1-5]>);([a-z])([a-z]).*$|$1$3$4/| # abcd/  双拼+2位辅助码+/
        - derive|^([a-z]+)(<[1-5]>);([a-z])([a-z]).*$|$1$2$3$4| # ab1cd  双拼+声调+2位辅助码
        - derive|^([a-z]+)(<[1-5]>);([a-z])([a-z]).*$|$1$2$3$4/| # ab1cd/ 双拼+声调+2位辅助码+/
        # 分号后面第二组辅助码
        - derive|^([a-z]+)(<[1-5]>);[^,]*,([a-z]).*$|$1$3| # abc  双拼+1位辅助码
        - derive|^([a-z]+)(<[1-5]>);[^,]*,([a-z]).*$|$1$2$3| # ab1c 双拼+声调+1位辅助码
        - abbrev|^([a-z]+)(<[1-5]>);[^,]*,([a-z])([a-z]).*$|$1$3$4| # abcd   双拼+2位辅助码
        - derive|^([a-z]+)(<[1-5]>);[^,]*,([a-z])([a-z]).*$|$1$3$4/| # abcd/  双拼+2位辅助码+/
        - derive|^([a-z]+)(<[1-5]>);[^,]*,([a-z])([a-z]).*$|$1$2$3$4| # ab1cd  双拼+声调+2位辅助码
        - derive|^([a-z]+)(<[1-5]>);[^,]*,([a-z])([a-z]).*$|$1$2$3$4/| # ab1cd/ 双拼+声调+2位辅助码+/
        - erase/.*;.*/
        # 大写
        - derive|^([a-z]{2})(<[1-5]>)([a-z])([a-z])$|$1$2\u$3\u$4| # ab1CD
        - derive|^([a-z]{2})([a-z])([a-z])$|$1\u$2\u$3| # abCD

        - xform/<1>/6/
        - xform/<2>/7/
        - xform/<3>/8/
        - xform/<4>/9/
        - xform/<5>/0/
imr_T93:
  __patch:
    - __append: { __include: 声调 }
    - __append: { __include: 自然码 }
    - __append: { __include: 九宫格 }
    - __append:
        - derive/^([1-9])[1-9]{2}(?=$|(<[1-5]>))/${1}00/ # N00
        - derive/^([1-9][1-9])[1-9](?=$|(<[1-5]>))/${1}0/ # NN0

        - derive/^(...)<[1-5]>(?=$|;)/${1}/
        - xform/^(.*);.*$/${1}/

        - xform/<1>/a/
        - xform/<2>/b/
        - xform/<3>/c/
        - xform/<4>/d/
        - xform/<5>/e/
imr_DPY_radical_pinyin:
  __patch:
    - __append: { __include: 自然码 }
    - __append:
        - xform/'//
imr_T93_radical_pinyin:
  __patch:
    - __append: { __include: 自然码 }
    - __append: { __include: 九宫格 }
    - __append:
        - xform/'//
