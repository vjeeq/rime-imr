T93:
  # 第三键
  - xform/(^|[ '])([1-9])([1-9])1/${1}<${2}1><${3}1>/
  - xform/(^|[ '])([1-9])([1-9])2/${1}<${2}1><${3}2>/
  - xform/(^|[ '])([1-9])([1-9])3/${1}<${2}1><${3}3>/
  - xform/(^|[ '])([1-9])([1-9])4/${1}<${2}2><${3}1>/
  - xform/(^|[ '])([1-9])([1-9])5/${1}<${2}2><${3}2>/
  - xform/(^|[ '])([1-9])([1-9])6/${1}<${2}2><${3}3>/
  - xform/(^|[ '])([1-9])([1-9])7/${1}<${2}3><${3}1>/
  - xform/(^|[ '])([1-9])([1-9])8/${1}<${2}3><${3}2>/
  - xform/(^|[ '])([1-9])([1-9])9/${1}<${2}3><${3}3>/
  # 九宫格数字映射
  # |by*|kvc|qso|
  # |fnz|pix|gte|
  # |jml|ruw|hda|
  - xform/<11>/b/
  - xform/<12>/y/
  - xform/<21>/k/
  - xform/<22>/v/
  - xform/<23>/c/
  - xform/<31>/q/
  - xform/<32>/s/
  - xform/<33>/o/
  - xform/<41>/f/
  - xform/<42>/n/
  - xform/<43>/z/
  - xform/<51>/p/
  - xform/<52>/i/
  - xform/<53>/x/
  - xform/<61>/g/
  - xform/<62>/t/
  - xform/<63>/e/
  - xform/<71>/j/
  - xform/<72>/m/
  - xform/<73>/l/
  - xform/<81>/r/
  - xform/<82>/u/
  - xform/<83>/w/
  - xform/<91>/h/
  - xform/<92>/d/
  - xform/<93>/a/
imr_T93:
  __patch:
    - __append:
        - xform/a/<1>/
        - xform/b/<2>/
        - xform/c/<3>/
        - xform/d/<4>/
        - xform/e/<5>/
        - xform/(^|[ '])([1-9])([0-9])([0-9])(?=$|[ '])/${1}${2}${3}${4}<6>/
    - __append: { __include: T93 }
    - __append: { __include: 自然码 }
    - __append: { __include: 声调 }
imr_DPY:
  __patch:
    - __append:
        - xform/6/<1>/
        - xform/7/<2>/
        - xform/8/<3>/
        - xform/9/<4>/
        - xform/0/<5>/
      # - xform/(^|[ '])([a-z]+)(?=$|[ '])/${1}${2}${3}<6>/
    - __append: { __include: 自然码 }
    - __append: { __include: 声调 }

imr_DPY_radical_lookup:
  __patch:
    - __append:
        - xform/([a-z]{2})(?=[^'])/${1}'/
        - xform/([a-z]{2})/${1}<6>/
    - __append: { __include: 自然码 }
    - __append:
        - xform/<6>//
imr_T93_radical_lookup:
  __patch:
    - __append:
        - xform/([1-9]{3})(?=[^'])/${1}'/
        - xform/([1-9]{3})/${1}<6>/
    - __append: { __include: T93 }
    - __append: { __include: 自然码 }
    - __append:
        - xform/<6>//
imr_T93_stroke_lookup:
  - xlit/12345/⼀⼁⼃⼂⼄/
