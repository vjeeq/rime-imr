  - xform/a([a-z]*)<2>/á${1}/
  - xform/a([a-z]*)<3>/ǎ${1}/
  - xform/a([a-z]*)<4>/à${1}/

  - xform/e([a-z]*)<1>/ē${1}/
  - xform/e([a-z]*)<2>/é${1}/
  - xform/e([a-z]*)<3>/ě${1}/
  - xform/e([a-z]*)<4>/è${1}/

