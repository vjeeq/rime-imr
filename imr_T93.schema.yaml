# Rime schema
# encoding: utf-8

# 适配了仓输入法 [Hamster](https://github.com/imfuxiao/Hamster/) 九宫格布局。
#
# 可选，支持英文：
# 1. 解开 `engine/translators` 下的注释
# 2. 将 `others/Hamster/melt_eng.custom.yaml` 里的文件拷贝至配置目录，该补丁转写了英文的拼写规则到九宫格；

t9:
  # 是否显示 rime 中原始的预编辑文本，默认为 true
  # true: 对 preedit 不做处理，显示 rime 返回的原始 preedit 值。
  #       如果想通过 lua 自己调整 preedit 的显示，可以设置为 true。
  # false: 根据候选字 comment 显示转换后的 preedit 内容。
  #        注意：请务必保证候选字 comment 有效且正确，否则可能导致预编辑文本显示异常。
  isDisplayOriginalPreedit: true

schema:
  schema_id: imr_T93
  name: IMR-九键三拼
  version: "alpha"
  author:
    - Dvel
    - "[morse.hsiao](https://github.com/imfuxiao)"
    - "[tong-zhi-qing-shao-dian-shui](https://www.zhihu.com/people/tong-zhi-qing-shao-dian-shui)"
    - "[xcxyhe](https://github.com/xcxyhe)"
  description: |
    九键双拼输入方案
    通过第三键实现字母定位
  dependencies:
    # - melt_eng # 英文输入，作为次翻译器挂载到拼音方案
    - imr_T93_radical_pinyin
    - imr_T93_stroke
    - imr_T93_auxcode
    - imr_auxcode_comment

engine:
  processors:
    - lua_processor@*imr.T93_processor
    - lua_processor@*imr.select_char*Processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@radical_lookup  # 部件拆字自定义 tag
    - affix_segmentor@stroke_lookup   # 笔画拆字自定义 tag
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - lua_translator@*imr.select_char*Translator
    - lua_translator@*date_translator # 时间、日期、星期
    - table_translator@custom_phrase # 自定义短语 custom_phrase_t9.txt
    # - table_translator@melt_eng     # 英文输入
    - table_translator@radical_lookup    # 部件拆字反查
    - table_translator@stroke_lookup     # 笔画拆字反查
    - lua_translator@*calc_translator    # 计算器
    - lua_translator@*force_gc           # 暴力 GC
  filters:
    - reverse_lookup_filter@reverse_lookup  # 部件拆字滤镜
    - lua_filter@*pin_cand_filter
    - simplifier@emoji # Emoji
    - simplifier@traditionalize # 简繁切换
    - lua_filter@*imr.aux_code
    - lua_filter@*imr.select_char*Filter
    - lua_filter@*imr.T93_filter
    - uniquifier # 去重

calculator:
  prefix: =
  show_prefix: true

# 处理符合特定规则的输入码，如网址、反查
recognizer:
  import_preset: default                # 从 default.yaml 继承通用的
  patterns:                             # 再增加方案专有的：
    calculator: "^=.+"                 # 响应 lua_translator@*calc_translator，计算器。前缀设定项 calculator/prefix
    radical_lookup: "^03[0-9]+$"        # 响应部件拆字的反查，触发前缀与 radical_lookup/prefix 匹配
    stroke_lookup: '^05[0-9]+$'

translator:
  prism: imr_T93
  dictionary: wanxiang
  spelling_hints: none
  comment_format: []
  # 显示原始输入
  preedit_format:
    __include: imr_config:/translator/preedit_format/imr_T93

# 自定义短语：custom_phrase_t9.txt
# ⚠️ 编码要用数字
custom_phrase:
  dictionary: ""
  user_dict: custom_phrase_t9
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 99

# 从 default 继承快捷键
key_binder:
  import_preset: default  # 从 default.yaml 继承通用的

punctuator:
  half_shape:
    # at
    a: [ "!", "@", "#", "$", "%", "^", "&", "*", "`", "_" ]
    # blance
    b: [ "“", "‘", "《", "（", "【", "{", "「", "『", "”", "’", "》", "）", "】", "}", "」", "』" ]
    # calc
    c: [ "=", "+", "-", "*", "/", "≠", "≈", "＋", "－", "×", "÷" ]
    # dot
    d: [ "、", "！", "；", "：", ",", "." ]
    # else
    e: [ "↑", "↓", "←", "→", "✓", "✗" ]

speller:
  alphabet: 0123456789`abcde
  initials: 0123456789
  delimiter: " '"  # 第一位<空格>是拼音之间的分隔符；第二位<'>表示可以手动输入单引号来分割拼音。
  algebra:
    __include: imr_config.yaml:/speller/algebra/imr_T93

# 反查
radical_lookup:
  tag: radical_lookup
  dictionary: imr_T93_radical_pinyin
  enable_user_dict: false
  prefix: "03"  # 反查前缀（反查时前缀会消失影响打英文所以设定为两个字母，或可改成一个非字母符号），与 recognizer/patterns/radical_lookup 匹配
  tips: "  〔拆字〕"
  comment_format:
    - erase/^.*$//
  preedit_format:
    __include: imr_config:/translator/preedit_format/imr_T93_radical_lookup
stroke_lookup:
  tag: stroke_lookup
  dictionary: imr_T93_stroke
  enable_user_dict: false
  prefix: "05"  # 反查前缀（反查时前缀会消失影响打英文所以设定为两个字母，或可改成一个非字母符号），与 recognizer/patterns/radical_lookup 匹配
  tips: "  〔笔画〕"
  comment_format:
    - erase/^.*$//
  preedit_format:
    __include: imr_config:/translator/preedit_format/imr_T93_stroke_lookup

# 拆字滤镜
reverse_lookup:
  tags: [ radical_lookup, stroke_lookup ]
  dictionary: wanxiang
  comment_format:
    __include: imr_config:/translator/comment_format/万象

aux:
  trigger:
    # default: '`'
    learn: '`'
    no_learn: '``'
  db: imr_T93_auxcode
  length: 3
  comment:
    enable: true
    db: imr_auxcode_comment

menu:
  alternative_select_keys: ABCDEFGHIJ

__patch:
  imr_grammar:/