# Rime schema
# encoding: utf-8

t9:
  # 是否显示 rime 中原始的预编辑文本，默认为 true
  # true: 对 preedit 不做处理，显示 rime 返回的原始 preedit 值。
  #       如果想通过 lua 自己调整 preedit 的显示，可以设置为 true。
  # false: 根据候选字 comment 显示转换后的 preedit 内容。
  #        注意：请务必保证候选字 comment 有效且正确，否则可能导致预编辑文本显示异常。
  isDisplayOriginalPreedit: true

schema:
  schema_id: imr_T93
  name: IMR-九键三拼
  version: "alpha"
  author:
    - Dvel
    - "[morse.hsiao](https://github.com/imfuxiao)"
    - "[tong-zhi-qing-shao-dian-shui](https://www.zhihu.com/people/tong-zhi-qing-shao-dian-shui)"
    - "[xcxyhe](https://github.com/xcxyhe)"
  description: |
    九键双拼输入方案
    通过第三键实现字母定位
  dependencies:
    - imr_T93_radical_pinyin
    - imr_T93_stroke
    - imr_T93_auxcode
    - imr_auxcode_comment
    - imr_T93_source


engine:
  processors:
    - lua_processor@*T93_processor
    - lua_processor@*select_char*Processor
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@radical_lookup  # 部件拆字自定义 tag
    - affix_segmentor@stroke_lookup   # 笔画拆字自定义 tag
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - lua_translator@*imr_script_translator@translator
    - table_translator@radical_lookup    # 部件拆字反查
    - table_translator@stroke_lookup     # 笔画拆字反查
    - lua_translator@*select_char*Translator
    - lua_translator@*gc
  filters:
    - lua_filter@*pin_filter
    - lua_filter@*order_filter
    - simplifier@emoji # Emoji
    - simplifier@traditionalize # 简繁切换
    - reverse_lookup_filter@reverse_lookup  # 部件拆字滤镜
    - lua_filter@*auxcode_filter
    - lua_filter@*T93_filter
    - lua_filter@*select_char*Filter
    - uniquifier # 去重


# 处理符合特定规则的输入码，如网址、反查
recognizer:
  import_preset: default                # 从 default 继承通用的
  patterns:                             # 再增加方案专有的：
    radical_lookup: "^03[0-9]+$"        # 响应部件拆字的反查，触发前缀与 radical_lookup/prefix 匹配
    stroke_lookup: '^05[0-9]+$'

translator:
  prism: imr_T93
  dictionary: imr_cn
  spelling_hints: none
  # 显示原始输入
  preedit_format:
    __include: config/preedit_format:/imr_T93


# 从 default 继承快捷键
key_binder:
  import_preset: default  # 从 default 继承通用的

punctuator:
  half_shape:
    # at
    a: [ "!", "@", "#", "$", "%", "^", "&", "*", "`", "_" ]
    # blance
    b: [ "“", "‘", "《", "（", "【", "{", "「", "『", "”", "’", "》", "）", "】", "}", "」", "』" ]
    # calc
    c: [ "=", "+", "-", "*", "/", "≠", "≈", "＋", "－", "×", "÷" ]
    # dot
    d: [ "、", "！", "；", "：", ",", "." ]
    # else
    e: [ "↑", "↓", "←", "→", "✓", "✗" ]

speller:
  alphabet: 0123456789:;abcde
  initials: 0123456789
  delimiter: " '"  # 第一位<空格>是拼音之间的分隔符；第二位<'>表示可以手动输入单引号来分割拼音。
  algebra:
    __include: config/algebra:/imr_T93

# 反查
radical_lookup:
  tag: radical_lookup
  dictionary: imr_T93_radical_pinyin
  enable_user_dict: false
  prefix: "03"  # 反查前缀（反查时前缀会消失影响打英文所以设定为两个字母，或可改成一个非字母符号），与 recognizer/patterns/radical_lookup 匹配
  tips: "  〔拆字〕"
  comment_format:
    - erase/^.*$//
  preedit_format:
    __include: config/preedit_format:/imr_T93_radical_lookup
stroke_lookup:
  tag: stroke_lookup
  dictionary: imr_T93_stroke
  enable_user_dict: false
  prefix: "05"  # 反查前缀（反查时前缀会消失影响打英文所以设定为两个字母，或可改成一个非字母符号），与 recognizer/patterns/radical_lookup 匹配
  tips: "  〔笔画〕"
  comment_format:
    - erase/^.*$//
  preedit_format:
    __include: config/preedit_format:/imr_T93_stroke_lookup

# 拆字滤镜
reverse_lookup:
  tags: [ radical_lookup, stroke_lookup ]
  dictionary: imr_cn
  comment_format:
    __include: config/comment_format:/万象

auxcode:
  trigger: ';'
  no_learn_trigger: ';;'
  length: 3
  show_comment: true

db:
  source: imr_T93_source
  auxcode: imr_T93_auxcode
  auxcode_comment: imr_auxcode_comment

menu:
  alternative_select_keys: ABCDEFGHIJ

__include: imr_grammar:/


order:
  - words: ['他','她','它']
    type: contains      # 左右模糊
  - words: ['那', '哪']
    type: starts_with   # 右模糊 ( 那个 > 哪个, 避免 ...那X 一定 > ...哪X (可能语言模型会给出更准全的选项?) )
  - words: ['的', '地', '得']
    type: ends_with     # 左模糊 ( XX的 > XX地 > XX得, 避免 XX的YY 一定 > XX地YY (可能语言模型会给出更准全的选项?) )
  - words: ['哥伦比娅', '哥伦比亚']
    type: exact         # 精准 ( 避免 '哥伦比娅大学' > '哥伦比亚大学' )